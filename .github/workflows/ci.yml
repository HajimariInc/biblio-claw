name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: pnpm install --frozen-lockfile
      - name: Install agent-runner deps (Bun)
        working-directory: container/agent-runner
        run: bun install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Typecheck host
        run: pnpm exec tsc --noEmit

      - name: Typecheck container
        run: pnpm exec tsc -p container/agent-runner/tsconfig.json --noEmit

      - name: Host tests
        run: pnpm exec vitest run

      - name: Container tests
        working-directory: container/agent-runner
        run: bun test

      - name: Guard against hardcoded GCP project ID
        # 再混入防止 (public 化 cleanup、issue #168): 特定 project id は placeholder
        # (`<your-gcp-project>`) or env 参照 (`${GCP_PROJECT_ID}`) に統一する。
        # `.claude/` は gitignore 済みで CI checkout に含まれないため exclude 記述は不要。
        # 検索 pattern の先頭を bracket ([h]) で囲む = grep の正規表現としては同じ 1 文字だが、
        # ci.yml 内の pattern リテラル自身にマッチしない = self-hit 回避 (classic pattern)。
        run: |
          if git grep -l '[h]ajimari-ai-hackathon-2026'; then
            echo "ERROR: hardcoded GCP project ID detected." >&2
            echo "  See PR body / issue #168 for the replacement policy" >&2
            echo "  (docs -> <your-gcp-project> placeholder / code -> \${GCP_PROJECT_ID} env)." >&2
            exit 1
          fi
