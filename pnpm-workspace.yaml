onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - protobufjs
  - sharp

pnpm:
  minimumReleaseAge: 4320

overrides:
  form-data: ^4.0.6
  js-yaml: ^4.2.0
  vite: ^8.0.16
  chat: 4.30.0
  # ADK (`@google/adk@^1.3.0`) は `@opentelemetry/api` の exact `1.9.0` を要求するが
  # biblio-claw は 1.9.1 (= M4-A 計装の運用実績、`package.json` で exact pin) を取る。
  # global singleton による runtime 害は元々ないが、tree clarity (= 単一 version で
  # 解決を強制) のために pnpm overrides で 1.9.1 に統一する (M4-B Phase 0 追加)。
  '@opentelemetry/api': '1.9.1'
  # `@opentelemetry/core` の W3C Baggage propagation に unbounded memory alloc の
  # CVE-2026-54285 (medium) がある。biblio-claw src/ で Baggage は不使用
  # (`grep -rn Baggage src/` で 0 件) だが、public 化前 supply-chain 衛生 +
  # GitHub Dependabot alert #17 の clear のために、fix version である 2.8.0 に
  # exact 統一する。従来 `@google/adk@1.3.0` の transitive で 2.1.0 と 2.8.0 の
  # 2 系統を引き込んでいたが、single version に強制収束させることで、alert #17
  # が close (fixed) になる。exact pin なのは `@opentelemetry/api: '1.9.1'` の
  # 既存 pattern と一貫させるため (issue #113 対応で追加)。
  '@opentelemetry/core': '2.8.0'
  # issue #136 Step 3-a: `@anthropic-ai/vertex-sdk@0.18.0` が内部で要求する
  # `google-auth-library@9.15.1` に root 直接依存 (`package.json`) を合わせる。
  # 2 バージョン共存で `AnthropicVertex({googleAuth: new GoogleAuth(...)})` 明示
  # 渡しが `TS2322: Property '#private' in type 'GoogleAuth' refers to a different
  # member` で型崩壊するため (`google-auth-library` の class private field が
  # nominal typing で別バージョン非互換扱いになる TypeScript 挙動)。
  # 単一 version 化で SDK 内部 `#adaptRequest` と同一 `AuthClient` instance を共有
  # 可能となり、pre-flight capture (Step 3-b) が SDK が実際に送る Authorization を
  # 観察できる。将来 `vertex-sdk` を bump するときは overrides の巻き戻しが必要
  # (tracking issue 別途)。
  'google-auth-library': '9.15.1'
