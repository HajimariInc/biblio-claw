# Orchestrator: NanoClaw host プロセスを GKE 上で動かす単一の StatefulSet。
# replicas=1 で SQLite + PVC が安全 (PoC-13 写経)。
# A 案 (M1 Phase 2): Slack adapter は src/channels/slack.ts で main host に統合
# 済のため、本 Pod の envFrom で SLACK_BOT_TOKEN / SLACK_APP_TOKEN を受け取れば
# self-registration が token を見つけて起動する = 別 Pod 不要。
# M2 Phase 1: CONTAINER_PROVIDER=k8s を有効化し、agent コンテナを K8s Job として
# spawn する (k8s/02-orchestrator-rbac.yaml の RBAC が前提)。SKIP_CONTAINER_
# RUNTIME_CHECK env は廃止 — Provider 抽象化で K8s API の到達確認に置換。
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: biblio-orchestrator
  namespace: biblio-claw
  labels:
    app.kubernetes.io/name: biblio-claw
    app.kubernetes.io/component: orchestrator
spec:
  serviceName: biblio-orchestrator
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: biblio-claw
      app.kubernetes.io/component: orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: biblio-claw
        app.kubernetes.io/component: orchestrator
    spec:
      serviceAccountName: biblio-orchestrator-ksa
      containers:
        - name: orchestrator
          # tag `m1-p1` を Phase 2 / M2 着手期の iteration で何度か上書き push するため、
          # 同 tag への push 後に rollout で確実に新 SHA を引かせるべく Always 指定する。
          # iteration が落ち着いたら digest pin (@sha256:...) に切り替えること (reproducibility 担保)。
          image: asia-northeast1-docker.pkg.dev/hajimari-ai-hackathon-2026/biblio-claw/biblio-claw:m1-p1
          imagePullPolicy: Always
          env:
            # === 環境差分アダプタの env switch ===
            - { name: DSN_PROVIDER, value: gke } # src/adapters/dsn/gke.ts
            - { name: SCHEDULER_PROVIDER, value: local }
            - { name: SECRET_PROVIDER, value: onecli }
            # M2 Phase 1: agent コンテナを K8s Job として spawn する Provider に切替。
            # `docker` (default) の場合は dockerd を要求して FATAL クラッシュする。
            - { name: CONTAINER_PROVIDER, value: k8s } # src/adapters/container/k8s.ts
            # === K8s Job spawn 用設定 ===
            # K8sJobProvider が createNamespacedJob 第 1 引数 + Informer path に使う
            - { name: BIBLIO_NAMESPACE, value: biblio-claw }
            # Job template の image (= agent コンテナの実体)。tag は orchestrator と
            # 同じ Artifact Registry レポジトリだが nanoclaw-agent image を指す。
            # `imagePullPolicy: Always` で latest 系 tag の上書き push にも追従する。
            - {
                name: BIBLIO_AGENT_IMAGE,
                value: asia-northeast1-docker.pkg.dev/hajimari-ai-hackathon-2026/biblio-claw/nanoclaw-agent:m1-p1,
              }
            # === DSN root (PVC mountPath) ===
            - { name: DATA_DIR, value: /data }
            # === OneCLI gateway (in-cluster ClusterIP) ===
            - { name: ONECLI_URL, value: 'http://biblio-onecli.biblio-claw.svc.cluster.local:10254' }
            # === Vertex × Claude (OneCLI MITM 経由、PoC-2 / Phase 1 と同) ===
            - { name: CLAUDE_CODE_USE_VERTEX, value: '1' }
            - { name: ANTHROPIC_VERTEX_PROJECT_ID, value: hajimari-ai-hackathon-2026 }
            - { name: CLOUD_ML_REGION, value: global }
            # === Assistant identity ===
            - { name: ASSISTANT_NAME, value: biblio }
          # Slack tokens (A 案: Slack は orchestrator に統合)。Secret が未投入
          # でも Pod は起動できるよう optional 化 (factory が null を返して skip)。
          envFrom:
            - secretRef:
                name: biblio-slack-tokens
                optional: true
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            # GKE Autopilot 用に requests のみ指定 (Autopilot が limits を同値に補完)
            requests:
              cpu: 500m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ['ReadWriteOnce']
        storageClassName: standard-rwo
        resources:
          requests:
            storage: 1Gi
