# Fugue channel Ingress/Egress NetworkPolicy (M4-E Phase 5)。
#
# 構成方針:
# - orchestrator Pod (biblio-orchestrator StatefulSet) に Fugue endpoint (:8080) を露出させる
#   ため、GCP LB からの health check + traffic (`35.191.0.0/16` + `130.211.0.0/22`、公式 IP range)
#   を明示許可する。
# - Ingress を新設する = 現在 orchestrator Pod は NetworkPolicy Ingress 制限なし
#   (all-allowed) の状態から「明示的に許可した path のみ受ける」に切り替わるため、既存の
#   cluster 内通信 (agent Pod → OneCLI :10254/:10255) を保つよう同 namespace の Pod からの
#   ingress も明示追加する。
# - Egress は目的別に 4 rule 分離 (issue #128 の hardening 済):
#   (1) DNS: NodeLocal DNS (169.254.20.10/32) + kube-dns podSelector
#   (2) Cloud SQL Auth Proxy: VPC peering CIDR + :3307 (cloud-sql-proxy sidecar 専用)
#   (3) GCE metadata: 169.254.169.254 + :80 (WI 経路、orchestrator の keyless ADC 3 経路が要求)
#   (4) 外部 HTTPS: 0.0.0.0/0 + :443 (Vertex/GitHub/Cloud Trace/Secret Manager)
#   詳細は各 rule 直上のコメント参照。metadata (169.254.169.254) は agent Pod と違い
#   本 orchestrator Pod では WI (Workload Identity) 経路で必須 (fetch-pem gcloud auth /
#   cloud-sql-proxy sqladmin token / OneCLI Prisma IAM DB auth の 3 経路が要求、
#   block すると全 keyless ADC が silent に死ぬ = PR #126 直後の broken state の cause)。
#
# Dataplane V2 (Cilium) の制約:
# - Pod-to-Pod は `ipBlock` で許可できない = `podSelector` / `namespaceSelector` で許可する
# - 同 Pod localhost は NetworkPolicy 非対象 = orchestrator ↔ onecli sidecar 経路は無影響
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: biblio-fugue-channel
  namespace: biblio-claw
  labels:
    app.kubernetes.io/name: biblio-claw
    app.kubernetes.io/component: fugue-channel
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: biblio-claw
      app.kubernetes.io/component: orchestrator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # GCP LB health check + traffic の公式 IP range
    # (docs.cloud.google.com/kubernetes-engine/docs/how-to/network-policy#limitations 参照)
    - from:
        - ipBlock:
            cidr: 35.191.0.0/16
        - ipBlock:
            cidr: 130.211.0.0/22
      ports:
        - protocol: TCP
          port: 8080
    # 同 namespace 内 Pod からの ingress (全ポート許可)。`ports:` 省略 = orchestrator Pod の
    # 全 port へのアクセスを同 namespace 内 Pod に対して許可する。
    #
    # なぜ全ポート許可か:
    # - agent Pod (K8s Job spawn) → OneCLI proxy sidecar :10254 (MITM) / :10255 (health) の
    #   2 経路が主用途だが、これらは同 Pod 内 sidecar 間通信 (=localhost) のため NetworkPolicy
    #   非対象。ここで許可する対象は「別 Pod からの ingress」で、実質的には `pnpm run chat` CLI
    #   Unix socket 以外の in-cluster 通信 (将来の debug 用 exec / Prometheus scrape / 内部
    #   verify script 等) が該当する。
    # - port allowlist に絞ると新規 port 追加時に silent block を招く (例: 追加した internal
    #   endpoint が同 namespace の Pod から見えない不整合)。同 namespace という信頼境界内では
    #   NetworkPolicy より Pod 側 auth (Bearer / IP allowlist) で守るほうが実用的、というのが
    #   本 rule の設計判断。
    # - 外部 (Fugue) 経由の Ingress は Bearer auth (fugue-http.ts) で拒否する = 全ポート許可でも
    #   attack surface は Bearer 検証の後段に留まる。
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: biblio-claw
  egress:
    # GKE Autopilot NodeLocal DNS (既定 ON、agent-egress と同 pattern)
    - to:
        - ipBlock:
            cidr: 169.254.20.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # kube-dns Pod 直接 (fallback)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Cloud SQL Auth Proxy 経由の DB 接続 (cloud-sql-proxy sidecar → Cloud SQL private IP)
    # - :3307 = Cloud SQL Admin API tunnel (必須、Phase 5 実 deploy で判明。runbook §罠 12 参照)
    # - CIDR `10.191.0.0/16` = VPC peering allocation range (`gcloud compute addresses list
    #   --filter=purpose:VPC_PEERING` で特定、実 instance IP `10.191.0.3` を含む range を issue #128
    #   実装時に確定)。Cloud SQL の region 移設や peering 再割当で変わる可能性あり = その際は
    #   再検証 + 本行更新が必要 (runbook §罠 12 の CIDR runtime 特定手順参照)。
    # 注: :5432 は cloud-sql-proxy の localhost listen 用であり Pod 外 dial 対象外のため rule から
    #     除去 (issue #128、削除後の動作は 5 assertion で実機立証)。
    - to:
        - ipBlock:
            cidr: 10.191.0.0/16
      ports:
        - protocol: TCP
          port: 3307
    # GCE metadata server (WI proxy 経路、iptables で kube-system/gke-metadata-server にリダイレクト)
    # - fetch-pem initContainer (gcloud secrets versions access) が WI で ADC 解決
    # - cloud-sql-proxy sidecar が sqladmin API token を取得 (instance metadata refresh)
    # - OneCLI Prisma が IAM DB auth token を取得 (biblio-orchestrator@...iam)
    # agent Pod (60-netpol-agent-egress.yaml) は OneCLI 経由前提のため block できたが、
    # orchestrator は WI 直接使うため許可必須 (issue #128 実装時に WI 死のため block 解除、
    # PR #126 で agent egress pattern から継承した設計ミスの是正、runbook §罠 12 参照)。
    - to:
        - ipBlock:
            cidr: 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80
    # 外部 HTTPS (Vertex + GitHub + Cloud Trace + Cloud Logging + Secret Manager)
    # - Vertex (aiplatform.googleapis.com:443) = OneCLI MITM 経由 (同 Pod localhost 通過後 Pod 外発信)
    # - GitHub API (api.github.com:443) = OneCLI MITM 経由 + gh-token-rotator sidecar 直接発信
    # - Cloud Trace/Logging (telemetry.googleapis.com:443) = NO_PROXY で OneCLI 迂回、orchestrator
    #   本体から直接発信 (src/observability/no-proxy.ts 参照)
    # - Secret Manager (secretmanager.googleapis.com:443) = fetch-pem initContainer (gcloud) + WI 経由
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
