# Kubernetes ServiceAccount: orchestrator 1 体に集約 (WI 経由の GSA/KSA 統合)。
#
# OneCLI Deployment + GH Sidecar CronJob を orchestrator Pod の Native sidecar に
# 統合したため、KSA も orchestrator 1 つに集約する。GSA も新 `biblio-orchestrator`
# 1 つに統合し、WI (workload identity) / Secret Manager / Cloud SQL / Vertex AI 用の
# role を resource レベルで bind する (= "1 workload = 1 GSA" 公式推奨パターン)。
#
# gcloud 側の binding は初回 operator が 1 回手作業で実行。
# 統合前の旧 KSA + 対応 GSA は移行完了確認後に削除予定 (Rollback 窓を確保するため即削除しない)。
apiVersion: v1
kind: ServiceAccount
metadata:
  name: biblio-orchestrator-ksa
  namespace: biblio-claw
  labels:
    app.kubernetes.io/name: biblio-claw
    app.kubernetes.io/component: orchestrator
  annotations:
    iam.gke.io/gcp-service-account: biblio-orchestrator@${GCP_PROJECT_ID}.iam.gserviceaccount.com
